[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "ibl_to_nwb"
version="0.3.0"
authors = [
  { name="Cody Baker", email="cody.c.baker.phd@gmail.com" },
]
description = "Tools to convert IBL data to NWB format.."
readme = "README.md"
keywords = ["nwb", "dandi", "ibl"]
license = {file = "license.txt"}
requires-python = ">=3.10"
dependencies = [
    "dandi",
    "neuroconv>=0.8.2",
    "spikeinterface",
    "probeinterface",
    "ndx-pose>=0.2.2",
    "ONE-api",
    "iblatlas",
    "ndx-ibl",
    "ndx-events==0.2.1",
    "ibl-neuropixel",
    "ndx-ibl-bwm",
    "ibllib",
    "ndx-anatomical-localization",
]

classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: MacOS",
    "License :: OSI Approved :: BSD License",
]

[tool.uv.sources]
ibl-neuropixel = {git = "https://github.com/int-brain-lab/ibl-neuropixel", branch = "main"}
ndx-ibl-bwm = {git = "https://github.com/int-brain-lab/ndx-ibl-bwm", branch = "main" }
ibllib = {git = "https://github.com/int-brain-lab/ibllib", branch = "NWB_conversion" }
ndx-anatomical-localization = {git = "https://github.com/catalystneuro/ndx-anatomical-localization"}


[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.toml
  |\.yml
  |\.txt
  |\.sh
  |\.git
  |\.ini
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''



[tool.ruff]
exclude = [
  "*/__init__.py"
]
line-length = 120

[tool.ruff.lint]
select = ["F", "E", "I", "UP031", "UP032"]
ignore = [
    "PTH123",
    "D203",
    "D212",
    "T201",
    "FIX002",
    "TD003",
    "TD002",
    "S101",
    "ICN001",
    "INP001",
    "E501",
]
fixable = ["ALL"]

[tool.ruff.lint.isort]
relative-imports-order = "closest-to-furthest"
known-first-party = ["ibl_to_nwb"]
